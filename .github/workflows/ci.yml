name: CI - Build and Push

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write #needed to push to GHCR

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true

      - name: Run tests
        run: go build ./...

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ghcr.io/${{ github.repository_owner }}/guardrail | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update image tag
        run: |
          sed -i "s|image: ghcr.io/gaouravpatil/guardrail:.*|image: ghcr.io/gaouravpatil/guardrail:${{ github.sha }}|" k8s/deployment.yaml

      - name: Deploy and verify
        run: |
          chmod +x scripts/deploy-and-verify.sh scripts/health-check.sh
          ./scripts/deploy-and-verify.sh
